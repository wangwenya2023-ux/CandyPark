name: 🍭 Candy Park CI/CD

# 触发条件：push 到 master 分支、PR 到 master 分支、或手动触发
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限，用于部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，跳过排队中的运行，但不取消正在进行的运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ========== 第一步：代码检查与测试 ==========
  lint-and-test:
    name: 🔍 代码检查与测试
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装检查工具
        run: |
          npm install -g htmlhint
          npm install -g csslint
          npm install -g jshint

      - name: 🔍 HTML 语法检查
        run: |
          echo "🔍 正在检查 HTML 文件..."
          # 创建 HTMLHint 配置，适配内联脚本的单页面项目
          cat > .htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": true,
            "tag-pair": true,
            "spec-char-escape": false,
            "id-unique": true,
            "src-not-empty": true,
            "attr-no-duplication": true,
            "title-require": true,
            "inline-style-disabled": false,
            "inline-script-disabled": false,
            "head-script-disabled": false
          }
          EOF
          htmlhint index.html
          echo "✅ HTML 检查通过！"

      - name: 🎨 CSS 内联样式检查
        run: |
          echo "🎨 正在提取并检查内联 CSS..."
          # 提取 <style> 标签中的 CSS 内容进行检查
          python3 << 'PYEOF'
          import re
          import sys

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # 提取所有 <style> 标签中的内容
          styles = re.findall(r'<style[^>]*>(.*?)</style>', content, re.DOTALL)

          if not styles:
              print("⚠️ 未找到内联 CSS")
              sys.exit(0)

          css_content = '\n'.join(styles)

          # 基本 CSS 语法检查：检查花括号是否匹配
          open_braces = css_content.count('{')
          close_braces = css_content.count('}')

          errors = []
          if open_braces != close_braces:
              errors.append(f"❌ CSS 花括号不匹配: {{ 有 {open_braces} 个, }} 有 {close_braces} 个")

          # 检查是否有空的规则块
          empty_rules = re.findall(r'[^}]\s*\{\s*\}', css_content)
          if empty_rules:
              errors.append(f"⚠️ 发现 {len(empty_rules)} 个空的 CSS 规则块")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)

          print(f"✅ CSS 检查通过！共检查了 {len(styles)} 个 style 块，{open_braces} 条规则")
          PYEOF

      - name: 📜 JavaScript 语法检查
        run: |
          echo "📜 正在提取并检查内联 JavaScript..."
          # 提取 <script> 标签中的 JS 内容进行检查
          python3 << 'PYEOF'
          import re
          import subprocess
          import sys
          import tempfile
          import os

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # 提取所有 <script> 标签中的内容（排除外部引用的 script）
          scripts = re.findall(r'<script(?![^>]*\bsrc\b)[^>]*>(.*?)</script>', content, re.DOTALL)

          if not scripts:
              print("⚠️ 未找到内联 JavaScript")
              sys.exit(0)

          js_content = '\n'.join(scripts)

          # 写入临时文件用于 jshint 检查
          with tempfile.NamedTemporaryFile(mode='w', suffix='.js', delete=False, encoding='utf-8') as f:
              # 添加 jshint 配置注释
              f.write('/* jshint esversion: 11, browser: true, devel: true, unused: false, undef: false */\n')
              f.write('/* globals document, window, setTimeout, setInterval, clearInterval, clearTimeout, Audio, requestAnimationFrame, cancelAnimationFrame, alert, confirm, navigator, performance, HTMLElement, Event, MouseEvent, TouchEvent, localStorage */\n')
              f.write(js_content)
              tmp_path = f.name

          try:
              result = subprocess.run(
                  ['jshint', '--extract=auto', tmp_path],
                  capture_output=True, text=True
              )

              if result.stdout.strip():
                  # 过滤掉一些对内联脚本不适用的警告
                  lines = result.stdout.strip().split('\n')
                  real_errors = [l for l in lines if 'error' in l.lower() and 'too many errors' not in l.lower()]

                  if len(real_errors) > 10:
                      print(f"❌ 发现 {len(real_errors)} 个 JS 错误:")
                      for line in real_errors[:20]:
                          print(f"  {line}")
                      sys.exit(1)

              print(f"✅ JavaScript 检查通过！共检查了 {len(scripts)} 个 script 块")
          finally:
              os.unlink(tmp_path)
          PYEOF

      - name: 🌐 页面可访问性检查
        run: |
          echo "🌐 正在检查页面基本可访问性..."
          python3 << 'PYEOF'
          import re
          import sys

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          warnings = []
          errors = []

          # 检查是否有 DOCTYPE
          if '<!DOCTYPE html>' not in content and '<!doctype html>' not in content:
              errors.append("❌ 缺少 DOCTYPE 声明")

          # 检查是否有 lang 属性
          if not re.search(r'<html[^>]*\slang=', content):
              warnings.append("⚠️ <html> 标签缺少 lang 属性")

          # 检查是否有 viewport meta
          if 'viewport' not in content:
              warnings.append("⚠️ 缺少 viewport meta 标签")

          # 检查是否有 title
          if not re.search(r'<title[^>]*>.+</title>', content, re.DOTALL):
              errors.append("❌ 缺少页面标题 <title>")

          # 检查是否有 charset
          if 'charset' not in content.lower():
              warnings.append("⚠️ 缺少字符编码声明")

          # 检查图片是否有 alt 属性
          imgs_without_alt = re.findall(r'<img(?![^>]*\balt\b)[^>]*>', content)
          if imgs_without_alt:
              warnings.append(f"⚠️ 发现 {len(imgs_without_alt)} 个 <img> 标签缺少 alt 属性")

          for w in warnings:
              print(w)
          for e in errors:
              print(e)

          if errors:
              sys.exit(1)

          print("✅ 页面可访问性检查通过！")
          PYEOF

      - name: 📏 文件大小检查
        run: |
          echo "📏 正在检查文件大小..."
          # 检查 HTML 文件大小是否合理（不超过 500KB）
          FILE_SIZE=$(stat -f%z index.html 2>/dev/null || stat -c%s index.html 2>/dev/null)
          FILE_SIZE_KB=$((FILE_SIZE / 1024))
          echo "📄 index.html 大小: ${FILE_SIZE_KB}KB"

          if [ "$FILE_SIZE_KB" -gt 500 ]; then
            echo "⚠️ 警告: index.html 文件较大 (${FILE_SIZE_KB}KB > 500KB)，建议优化"
          fi

          # 检查图片文件总大小
          TOTAL_IMG_SIZE=0
          for img in *.png *.jpg *.jpeg *.gif *.webp *.svg 2>/dev/null; do
            if [ -f "$img" ]; then
              IMG_SIZE=$(stat -f%z "$img" 2>/dev/null || stat -c%s "$img" 2>/dev/null)
              IMG_SIZE_MB=$((IMG_SIZE / 1024 / 1024))
              echo "🖼️ $img: ${IMG_SIZE_MB}MB"
              TOTAL_IMG_SIZE=$((TOTAL_IMG_SIZE + IMG_SIZE))
            fi
          done

          TOTAL_MB=$((TOTAL_IMG_SIZE / 1024 / 1024))
          echo "📊 图片资源总大小: ${TOTAL_MB}MB"

          if [ "$TOTAL_MB" -gt 50 ]; then
            echo "❌ 图片资源总大小超过 50MB，请优化图片"
            exit 1
          fi

          echo "✅ 文件大小检查通过！"

  # ========== 第二步：部署到 GitHub Pages ==========
  deploy:
    name: 🚀 部署到 GitHub Pages
    needs: lint-and-test  # 依赖检查通过后才部署
    # 仅在 push 到 master 或手动触发时部署（PR 不部署）
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个项目根目录
          path: '.'

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ 部署完成
        run: |
          echo "🎉 Candy Park 已成功部署！"
          echo "🌐 访问地址: ${{ steps.deployment.outputs.page_url }}"
